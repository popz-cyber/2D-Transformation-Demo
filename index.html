<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2d Transformation Demo</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        canvas {
            flex: 1;
            display: block;
            border: 1px solid black;
        }

        .input-box {
            margin-top: 10px;
            padding: 10px;
            background-color: #f0f0f0;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap; 
        }

        .group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label {
            min-width: 70px; 
        }

        input {
            width: 100px;
            height: 20px;
        }
    </style>
</head>
<body>
    <canvas></canvas>

    <div class="input-box">
        <div class="group">
            <div class="field">
                <label>Move X:</label>
                <input id="tx" type="number" value="0">
            </div>
            <div class="field">
                <label>Move Y:</label>
                <input id="ty" type="number" value="0">
            </div>
        </div>

        <div class="group">
            <div class="field">
                <label>Scale X:</label>
                <input id="sx" type="number" value="1">
            </div>
            <div class="field">
                <label>Scale Y:</label>
                <input id="sy" type="number" value="1">
            </div>
        </div>
    </div>

    <p>Explanation: <a href="Documentation.pdf" target="_blank">Documentation</a></p>
    
    <script src="canvas.js"></script>
</body>
</html>
